name: Android Release APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Scaffold Android if missing
        run: |
          if [ ! -f "android/app/build.gradle" ]; then
            echo "Android folder missing – scaffolding..."
            flutter create . --org mg.chorale.antsafitia --project-name antsa_ny_fitia --platforms=android
          else
            flutter create . --org mg.chorale.antsafitia --project-name antsa_ny_fitia --platforms=android --no-overwrite || true
          fi

      - name: Apply custom app icon & name
        run: |
          # Copy our custom logo icons (if they exist in repo)
          if [ -d "android/app/src/main/res/mipmap-xxxhdpi" ]; then
            echo "mipmap already present"
            ls -lh android/app/src/main/res/mipmap-*/
          fi
          # Ensure AndroidManifest has correct label and icon
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            # backup
            cp $MANIFEST $MANIFEST.bak
            # update android:label if needed (flutter create already uses project name)
            sed -i 's/android:label="[^"]*"/android:label="Antsa ny Fitia"/g' $MANIFEST
            # ensure icon references
            grep -q 'android:icon="@mipmap/ic_launcher"' $MANIFEST || sed -i 's/<application/<application android:icon="@mipmap\/ic_launcher" android:roundIcon="@mipmap\/ic_launcher_round"/' $MANIFEST
            echo "=== AndroidManifest ==="
            cat $MANIFEST
          fi
          # Copy our prebuilt icons from repo assets if present
          if [ -f "assets/images/logo_antsan.jpg" ]; then
            echo "Logo found in assets – you may want to run flutter_launcher_icons locally"
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos || true

      - name: Run tests
        run: flutter test || echo "No tests"

      - name: Build APK release
        run: flutter build apk --release --split-per-abi

      - name: Build universal APK
        run: flutter build apk --release
        continue-on-error: true

      - name: Build AppBundle
        run: flutter build appbundle --release
        continue-on-error: true

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: antsa-ny-fitia-apk
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-*-release.apk
          retention-days: 30

      - name: Upload AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: antsa-ny-fitia-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
          if-no-files-found: ignore

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-*-release.apk
            build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true
          name: "Antsa ny Fitia ${{ github.ref_name }}"
          body: |
            Chorale Antsan'ny Fitia
            Paroisse Saint François d'Assise
            Tsararivotra Ambalavao

            APK Android généré automatiquement depuis GitHub
            Repo source: https://github.com/rindraleon/Antsan-ny-fitia
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
